<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>India District Map Tool — map.irt.co.in</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/7.0.0/fuse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PptxGenJS/3.12.0/pptxgen.bundled.js"></script>
<script src="india-map-paths.js"></script>
<script src="district-data.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F8FAFC;
    --surface: #FFFFFF;
    --surface2: #F1F5F9;
    --border: #E2E8F0;
    --border2: #CBD5E1;
    --text: #0F172A;
    --muted: #64748B;
    --accent: #2563EB;
    --accent-light: #DBEAFE;
    --accent-hover: #1D4ED8;
    --success: #16A34A;
    --warning: #D97706;
    --danger: #DC2626;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
    --shadow-lg: 0 20px 40px rgba(0,0,0,.1), 0 8px 16px rgba(0,0,0,.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: grid;
    grid-template-columns: 380px 1fr;
    grid-template-rows: 60px 1fr;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    grid-column: 1/-1;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    box-shadow: var(--shadow);
    z-index: 50;
  }

  .logo-mark {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #2563EB, #7C3AED);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: white; font-weight: 800;
    letter-spacing: -1px;
    flex-shrink: 0;
  }

  .logo-text {
    font-size: 15px; font-weight: 700; color: var(--text);
    letter-spacing: -0.3px;
  }
  .logo-domain {
    font-size: 11px; color: var(--muted); font-weight: 400;
    font-family: 'JetBrains Mono', monospace;
  }

  .header-spacer { flex: 1; }

  .selection-pill {
    display: flex; align-items: center; gap: 6px;
    background: var(--accent-light);
    border: 1px solid #BFDBFE;
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px; font-weight: 600; color: var(--accent);
  }

  .header-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 8px;
    font-size: 13px; font-weight: 600;
    cursor: pointer; border: none; font-family: inherit;
    transition: all .2s; white-space: nowrap;
  }
  .header-btn-ghost {
    background: transparent; color: var(--muted);
    border: 1px solid var(--border);
  }
  .header-btn-ghost:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); }

  /* ── SIDEBAR ── */
  aside {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .sidebar-top {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* Search */
  .search-container { position: relative; }
  .search-input {
    width: 100%;
    padding: 10px 14px 10px 40px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 13px; font-family: inherit;
    color: var(--text);
    outline: none;
    transition: all .2s;
  }
  .search-input:focus {
    border-color: var(--accent);
    background: white;
    box-shadow: 0 0 0 3px rgba(37,99,235,.1);
  }
  .search-input::placeholder { color: var(--muted); }
  .search-icon {
    position: absolute; left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  /* Search results dropdown */
  .search-results {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    box-shadow: var(--shadow-lg);
    z-index: 100;
    max-height: 280px;
    overflow-y: auto;
    display: none;
  }
  .search-results.open { display: block; }
  .search-result-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; cursor: pointer;
    transition: background .15s;
    border-bottom: 1px solid var(--border);
  }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover { background: var(--accent-light); }
  .result-type-badge {
    font-size: 10px; font-weight: 700; padding: 2px 6px;
    border-radius: 4px; letter-spacing: .5px; flex-shrink: 0;
  }
  .badge-state { background: #EEF2FF; color: #4338CA; }
  .badge-district { background: #F0FDF4; color: #15803D; }
  .result-name { font-size: 13px; font-weight: 500; flex: 1; }
  .result-parent { font-size: 11px; color: var(--muted); }

  /* ── SIDEBAR BODY ── */
  .sidebar-body {
    flex: 1; overflow-y: auto;
    padding: 8px;
  }

  /* State card */
  .state-card {
    border: 1.5px solid var(--border);
    border-radius: 12px;
    margin-bottom: 6px;
    overflow: hidden;
    transition: all .2s;
  }
  .state-card.selected { border-color: var(--accent); }
  .state-card-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; cursor: pointer;
    transition: background .15s;
    user-select: none;
  }
  .state-card-header:hover { background: var(--surface2); }
  .state-swatch {
    width: 28px; height: 28px; border-radius: 6px;
    border: 1.5px solid rgba(0,0,0,.08);
    flex-shrink: 0; cursor: pointer;
    position: relative;
  }
  .state-swatch input[type=color] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
    width: 100%; height: 100%;
  }
  .state-card-name { font-size: 13px; font-weight: 600; flex: 1; }
  .state-card-count {
    font-size: 11px; font-family: 'JetBrains Mono', monospace;
    color: var(--muted); background: var(--surface2);
    padding: 2px 7px; border-radius: 10px; border: 1px solid var(--border);
  }
  .state-card-check {
    width: 18px; height: 18px; border-radius: 4px;
    background: var(--accent); border: none;
    display: none; align-items: center; justify-content: center;
    color: white; font-size: 11px; flex-shrink: 0;
  }
  .state-card.selected .state-card-check { display: flex; }
  .state-expand-icon {
    color: var(--muted); transition: transform .2s;
    font-size: 12px;
  }
  .state-card.expanded .state-expand-icon { transform: rotate(180deg); }
  .state-remove-btn {
    width: 18px; height: 18px; border-radius: 4px;
    background: #FEE2E2; border: none; cursor: pointer;
    color: #DC2626; font-size: 12px; display: none;
    align-items: center; justify-content: center;
    flex-shrink: 0; transition: background .15s;
  }
  .state-card.selected .state-remove-btn { display: flex; }
  .state-remove-btn:hover { background: #FECACA; }

  /* District panel */
  .district-panel {
    display: none; padding: 0 10px 10px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }
  .state-card.expanded .district-panel { display: block; }
  .district-controls {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 0 8px;
  }
  .district-controls label { font-size: 11px; color: var(--muted); cursor: pointer; }
  .select-all-btn, .clear-btn {
    font-size: 10px; font-weight: 600; padding: 3px 8px;
    border-radius: 5px; border: none; cursor: pointer;
    font-family: inherit; transition: all .15s;
  }
  .select-all-btn { background: var(--accent-light); color: var(--accent); }
  .select-all-btn:hover { background: #BFDBFE; }
  .clear-btn { background: #FEE2E2; color: var(--danger); }
  .clear-btn:hover { background: #FECACA; }

  .district-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .district-tag {
    padding: 4px 9px; border-radius: 6px;
    font-size: 11px; font-weight: 500; cursor: pointer;
    transition: all .15s; border: 1.5px solid transparent;
    white-space: nowrap;
  }
  .district-tag:not(.active) {
    background: white; color: var(--muted);
    border-color: var(--border);
  }
  .district-tag:not(.active):hover {
    border-color: var(--border2); color: var(--text);
    transform: translateY(-1px);
  }
  .district-tag.active {
    color: white; border-color: transparent;
    transform: translateY(-1px);
    box-shadow: 0 2px 6px rgba(0,0,0,.12);
  }

  /* ── SIDEBAR FOOTER ── */
  .sidebar-footer {
    padding: 12px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface);
  }

  /* Preset bar */
  .preset-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .preset-scroll { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; }
  .preset-scroll::-webkit-scrollbar { height: 0; }
  .preset-chip {
    padding: 5px 11px; border-radius: 20px; white-space: nowrap;
    font-size: 11px; font-weight: 600; cursor: pointer;
    background: var(--surface2); color: var(--muted);
    border: 1.5px solid var(--border); font-family: inherit;
    transition: all .2s;
  }
  .preset-chip:hover { background: var(--accent-light); color: var(--accent); border-color: #93C5FD; }

  /* Export buttons */
  .export-row { display: flex; gap: 8px; margin-top: 10px; }
  .export-btn {
    flex: 1; padding: 9px; border-radius: 9px;
    font-size: 12px; font-weight: 700; cursor: pointer;
    border: none; font-family: inherit;
    transition: all .2s;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .export-png { background: #DCFCE7; color: #15803D; }
  .export-png:hover { background: #BBF7D0; transform: translateY(-1px); }
  .export-pdf { background: #FEF9C3; color: #A16207; }
  .export-pdf:hover { background: #FEF08A; transform: translateY(-1px); }
  .export-ppt { background: var(--accent-light); color: var(--accent); }
  .export-ppt:hover { background: #BFDBFE; transform: translateY(-1px); }
  .export-btn:active { transform: translateY(0); }

  /* ── MAIN CANVAS ── */
  main {
    display: flex; flex-direction: column; overflow: hidden;
    background: var(--bg);
  }

  .canvas-toolbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
  }
  .toolbar-group { display: flex; align-items: center; gap: 6px; }
  .toolbar-sep { width: 1px; height: 20px; background: var(--border); }
  .toolbar-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .toolbar-btn {
    padding: 5px 10px; border-radius: 7px;
    font-size: 11px; font-weight: 600; cursor: pointer;
    background: var(--surface2); border: 1.5px solid var(--border);
    color: var(--muted); font-family: inherit; transition: all .15s;
  }
  .toolbar-btn.active { background: var(--accent-light); border-color: #93C5FD; color: var(--accent); }
  .toolbar-btn:hover { border-color: var(--border2); color: var(--text); }

  .toolbar-input {
    padding: 4px 8px; border-radius: 6px;
    font-size: 11px; font-family: inherit;
    background: var(--surface2); border: 1.5px solid var(--border);
    color: var(--text); outline: none; width: 180px;
  }
  .toolbar-input:focus { border-color: var(--accent); }

  select.toolbar-select {
    padding: 4px 8px; border-radius: 6px;
    font-size: 11px; font-family: inherit;
    background: var(--surface2); border: 1.5px solid var(--border);
    color: var(--text); outline: none; cursor: pointer;
  }

  .canvas-spacer { flex: 1; }

  /* Map canvas area */
  .canvas-wrap {
    flex: 1; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    position: relative;
    cursor: grab;
  }
  .canvas-wrap:active { cursor: grabbing; }

  /* Empty state */
  .empty-state {
    text-align: center; color: var(--muted);
    animation: fadeIn .4s ease;
  }
  .empty-icon {
    width: 80px; height: 80px;
    background: var(--surface2); border: 2px dashed var(--border2);
    border-radius: 20px; margin: 0 auto 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
  }
  .empty-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .empty-sub { font-size: 13px; color: var(--muted); }

  /* Map output */
  #map-output {
    background: white;
    box-shadow: var(--shadow-lg);
    border-radius: 8px;
    overflow: visible;
    transform-origin: center center;
    transition: transform 0.1s ease-out;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  #map-svg { display: block; }

  /* Loader */
  .loading-bar {
    position: fixed; top: 60px; left: 380px; right: 0;
    height: 2px; background: var(--accent-light); z-index: 200;
    display: none;
  }
  .loading-bar-inner {
    height: 100%; background: var(--accent);
    animation: loadAnim 1.2s ease infinite;
  }
  @keyframes loadAnim {
    0% { width: 0%; margin-left: 0; }
    50% { width: 70%; margin-left: 10%; }
    100% { width: 0%; margin-left: 100%; }
  }

  /* Toast */
  .toast-wrap {
    position: fixed; bottom: 24px; right: 24px;
    display: flex; flex-direction: column; gap: 8px;
    z-index: 1000; pointer-events: none;
  }
  .toast {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 12px 16px;
    font-size: 13px; font-weight: 500; color: var(--text);
    box-shadow: var(--shadow-md);
    display: flex; align-items: center; gap: 10px;
    animation: toastIn .3s ease;
    pointer-events: auto;
  }
  .toast.success { border-color: #86EFAC; background: #F0FDF4; }
  .toast.error { border-color: #FCA5A5; background: #FFF1F2; }
  .toast.info { border-color: #93C5FD; background: #EFF6FF; }
  @keyframes toastIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  @keyframes toastOut {
    to { transform: translateX(110%); opacity: 0; }
  }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes popIn { from { opacity: 0; transform: scale(.95); } to { opacity: 1; transform: scale(1); } }

  .map-render-anim { animation: popIn .25s ease; }

  /* Color picker in toolbar */
  .color-swatch-btn {
    width: 28px; height: 28px; border-radius: 6px;
    border: 1.5px solid var(--border); cursor: pointer;
    position: relative; overflow: hidden;
  }
  .color-swatch-btn input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
</style>
</head>
<body>

<!-- Loading bar -->
<div class="loading-bar" id="loading-bar">
  <div class="loading-bar-inner"></div>
</div>

<!-- HEADER -->
<header>
  <div class="logo-mark">IN</div>
  <div>
    <div class="logo-text">India Map Tool</div>
    <div class="logo-domain">map.irt.co.in</div>
  </div>

  <div class="header-spacer"></div>

  <div class="selection-pill" id="sel-pill">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    <span id="sel-count">0 states · 0 districts</span>
  </div>

  <button class="header-btn header-btn-ghost" onclick="clearAll()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
    Clear All
  </button>
</header>

<!-- SIDEBAR -->
<aside>
  <div class="sidebar-top">
    <div class="search-container" id="search-container">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" class="search-input" id="search-input"
        placeholder="Search state or district…" autocomplete="off"
        oninput="onSearch(this.value)"
        onfocus="openSearch()"
      >
      <div class="search-results" id="search-results"></div>
    </div>
  </div>

  <div class="sidebar-body" id="state-list"></div>

  <div class="sidebar-footer">
    <div class="preset-label">Quick Select</div>
    <div class="preset-scroll">
      <button class="preset-chip" onclick="preset('south')">🌴 South India</button>
      <button class="preset-chip" onclick="preset('north')">🏔 North India</button>
      <button class="preset-chip" onclick="preset('west')">🌊 West India</button>
      <button class="preset-chip" onclick="preset('east')">🌿 East India</button>
      <button class="preset-chip" onclick="preset('ne')">🍃 Northeast</button>
      <button class="preset-chip" onclick="preset('central')">🏛 Central</button>
      <button class="preset-chip" onclick="preset('all')">🇮🇳 All India</button>
    </div>

    <div class="export-row">
      <button class="export-btn export-png" onclick="exportPNG()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        PNG
      </button>
      <button class="export-btn export-pdf" onclick="exportPDF()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        PDF
      </button>
      <button class="export-btn export-ppt" onclick="exportPPT()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        PPT
      </button>
    </div>
  </div>
</aside>

<!-- MAIN -->
<main>
  <div class="canvas-toolbar">
    <div class="toolbar-group">
      <span class="toolbar-label">Size</span>
      <select class="toolbar-select" id="sz" onchange="renderMap()">
        <option value="1280x720">1280×720 HD</option>
        <option value="1920x1080">1920×1080 FHD</option>
        <option value="2560x1440">2560×1440 2K</option>
        <option value="1000x1000">1000×1000 Square</option>
        <option value="794x1123">A4 Portrait</option>
        <option value="1123x794">A4 Landscape</option>
      </select>
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
      <span class="toolbar-label">Title</span>
      <input type="text" class="toolbar-input" id="title-input" placeholder="Add a title…" oninput="renderMap()">
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
      <span class="toolbar-label">BG</span>
      <div class="color-swatch-btn" id="bg-swatch" style="background:#FFFFFF">
        <input type="color" value="#ffffff" oninput="document.getElementById('bg-swatch').style.background=this.value; renderMap()">
      </div>
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
      <button class="toolbar-btn active" id="labels-btn" onclick="toggleLabels()">Labels</button>
      <button class="toolbar-btn active" id="legend-btn" onclick="toggleLegend()">Legend</button>
      <button class="toolbar-btn active" id="autofit-btn" onclick="toggleAutofit()">Auto Fit</button>
    </div>

    <div class="canvas-spacer"></div>

    <div class="toolbar-group">
      <button class="toolbar-btn" onclick="zoomOut()" title="Zoom Out">−</button>
      <button class="toolbar-btn" onclick="zoomReset()" title="Reset Zoom" style="font-size:10px">Reset</button>
      <button class="toolbar-btn" onclick="zoomIn()" title="Zoom In">+</button>
    </div>
  </div>

  <div class="canvas-wrap" id="canvas-wrap">
    <div id="empty-state" class="empty-state">
      <div class="empty-icon">🗺️</div>
      <div class="empty-title">Koi state select nahi hua</div>
      <div class="empty-sub">Left panel se state search karo ya preset use karo</div>
    </div>
    <div id="map-output" style="display:none">
      <svg id="map-svg"></svg>
    </div>
  </div>
</main>

<!-- Toasts -->
<div class="toast-wrap" id="toast-wrap"></div>

<script src="app.js"></script>
</body>
</html>
